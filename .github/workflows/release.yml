name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: WindowedClaude-windows-x64
          path: target/x86_64-pc-windows-msvc/release/windowed-claude.exe

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - run: |
          lipo -create \
            target/aarch64-apple-darwin/release/windowed-claude \
            target/x86_64-apple-darwin/release/windowed-claude \
            -output WindowedClaude-macos
      - uses: actions/upload-artifact@v4
        with:
          name: WindowedClaude-macos
          path: WindowedClaude-macos

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - run: mv target/x86_64-unknown-linux-gnu/release/windowed-claude WindowedClaude-linux
      - uses: actions/upload-artifact@v4
        with:
          name: WindowedClaude-linux
          path: WindowedClaude-linux

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WindowedClaude-windows-x64/windowed-claude.exe
            WindowedClaude-macos/WindowedClaude-macos
            WindowedClaude-linux/WindowedClaude-linux
          generate_release_notes: true
